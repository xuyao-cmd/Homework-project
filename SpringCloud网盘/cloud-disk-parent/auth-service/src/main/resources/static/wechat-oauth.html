<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信授权登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .logo {
            width: 60px;
            height: 60px;
            background: #07c160;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #fff;
        }
        h2 { font-size: 22px; color: #333; margin-bottom: 8px; }
        .subtitle { color: #999; font-size: 14px; margin-bottom: 30px; }
        .qrcode-box {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            border-radius: 12px;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #07c160;
        }
        .qrcode-icon { font-size: 80px; margin-bottom: 10px; }
        .qrcode-text { font-size: 13px; color: #07c160; font-weight: 500; }
        .scan-tip { color: #666; font-size: 14px; margin-bottom: 20px; }
        .simulate-btn {
            display: inline-block;
            padding: 12px 40px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .simulate-btn:hover { background: #06ad56; }
        .tip { margin-top: 20px; font-size: 12px; color: #aaa; }
        .loading { display: none; }
        .loading.active { display: block; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #07c160;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💬</div>
        <h2>微信授权登录</h2>
        <p class="subtitle">请使用微信扫描二维码</p>
        
        <div id="qrcodeSection">
            <div class="qrcode-box">
                <div class="qrcode-icon">📱</div>
                <div class="qrcode-text">模拟二维码</div>
            </div>
            <p class="scan-tip">请使用微信扫一扫登录</p>
            <button class="simulate-btn" onclick="simulateScan()">模拟扫码授权</button>
            <p class="tip">（演示模式 - 点击按钮模拟扫码）</p>
        </div>
        
        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p style="color:#666;font-size:14px;">正在授权登录中...</p>
        </div>
    </div>

    <script>
        // 从URL获取回调地址（指向前端OAuth回调页）
        const params = new URLSearchParams(window.location.search);
        const frontendCallback = params.get('callback');

        function simulateScan() {
            document.getElementById('qrcodeSection').style.display = 'none';
            document.getElementById('loadingSection').classList.add('active');
            
            // 模拟扫码成功后，跳转到前端回调页，由前端去调用后端接口拿token
            setTimeout(() => {
                window.location.href = frontendCallback;
            }, 1500);
        }
    </script>
</body>
</html>
